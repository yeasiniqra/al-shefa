<svg viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="220" rx="14" fill="#F3F7F2"/>
  <ellipse cx="150" cy="185" rx="90" ry="10" fill="#E3ECE1"/>
  <!-- tipped-over bottle -->
  <g transform="rotate(-18 100 120)">
    <rect x="60" y="70" width="80" height="100" rx="14" fill="#FFFFFF" stroke="#D8E2D6" stroke-width="2"/>
    <rect x="72" y="55" width="56" height="22" rx="6" fill="#CFE3D2"/>
    <rect x="60" y="100" width="80" height="34" fill="#1F7A3D" opacity="0.9"/>
  </g>
  <!-- spilled capsules -->
  <g>
    <ellipse cx="170" cy="150" rx="15" ry="9" fill="#E53935" transform="rotate(20 170 150)"/>
    <ellipse cx="170" cy="150" rx="15" ry="9" fill="#FFFFFF" transform="rotate(20 170 150) translate(15 0)"/>
    <ellipse cx="200" cy="140" rx="15" ry="9" fill="#1E88E5" transform="rotate(-15 200 140)"/>
    <ellipse cx="200" cy="140" rx="15" ry="9" fill="#FFFFFF" transform="rotate(-15 200 140) translate(-15 0)"/>
    <ellipse cx="215" cy="165" rx="13" ry="8" fill="#8BC34A" transform="rotate(35 215 165)"/>
    <ellipse cx="215" cy="165" rx="13" ry="8" fill="#FFFFFF" transform="rotate(35 215 165) translate(13 0)"/>
    <circle cx="185" cy="175" r="7" fill="#FB8C00"/>
    <circle cx="230" cy="150" r="6" fill="#1F7A3D"/>
  </g>
</svg>
